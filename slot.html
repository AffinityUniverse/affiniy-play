<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #DDE5FF;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* ─────────────────────────────────
   WRAPPER
───────────────────────────────── */
#machine-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

@keyframes shake {
  0%,100% { transform: translate(0,0); }
  20%  { transform: translate(-6px,-2px); }
  40%  { transform: translate( 6px, 2px); }
  60%  { transform: translate(-4px, 2px); }
  80%  { transform: translate( 3px,-1px); }
}
#machine-wrapper.shake { animation: shake 0.38s ease-out; }

/* ─────────────────────────────────
   MACHINE BODY  (all blue)
───────────────────────────────── */
#slot-machine {
  width: 280px;
  background: #4D72FB;
  border-radius: 32px;
  padding: 28px 24px 26px;
  position: relative;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.22),   /* top highlight */
    inset 0 -3px 0 rgba(0,0,60,0.18),        /* bottom shadow */
    0 20px 52px rgba(77,114,251,0.38),
    0  6px 18px rgba(77,114,251,0.22);
}

/* ─────────────────────────────────
   TOP  HEADER  PIPS
───────────────────────────────── */
.header-pips {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 7px;
  margin-bottom: 24px;
}
.pip {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
}
.pip.wide {
  width: 26px;
  border-radius: 4px;
  background: rgba(255,255,255,0.75);
}

/* ─────────────────────────────────
   SCREEN  (reel window)
───────────────────────────────── */
.screen-wrap {
  background: rgba(0,0,40,0.28);
  border-radius: 22px;
  padding: 7px;
}

#reel-viewport {
  border-radius: 16px;
  overflow: hidden;
  position: relative;
  background: #fff;
  aspect-ratio: 1;
  /* no transition needed — JS handles everything */
}

/* spinning blue ring */
#reel-viewport.spinning::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  box-shadow: inset 0 0 0 3px rgba(255,255,255,0.45),
              0 0 28px rgba(255,255,255,0.3);
  pointer-events: none;
  z-index: 5;
}

/* jackpot pulse */
#reel-viewport.jackpot-glow {
  animation: jpPulse 0.24s ease-in-out infinite alternate;
}
@keyframes jpPulse {
  from { box-shadow: 0 0 0 4px rgba(255,255,255,0.6), 0 0 40px rgba(255,255,255,0.4); }
  to   { box-shadow: 0 0 0 6px rgba(255,255,255,1),   0 0 80px rgba(255,255,255,0.7); }
}

/* ─────────────────────────────────
   REEL  STRIP
───────────────────────────────── */
#reel-strip {
  position: absolute;
  inset: 0 0 auto 0;
  will-change: transform;
}

.sym-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  /* no border — seamless */
}

.sym-cell img {
  width: 76%;
  height: 76%;
  object-fit: contain;
  display: block;
  pointer-events: none;
  user-select: none;
}

/* ─────────────────────────────────
   RESULT  TEXT
───────────────────────────────── */
#result-msg {
  margin-top: 18px;
  text-align: center;
  height: 22px;
  line-height: 22px;
  color: rgba(255,255,255,0.9);
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2.5px;
  font-family: 'Helvetica Neue', Arial, sans-serif;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50%     { opacity: 0.3; }
}

/* ─────────────────────────────────
   BOTTOM  DOTS
───────────────────────────────── */
.bottom-pips {
  display: flex;
  justify-content: center;
  gap: 7px;
  margin-top: 20px;
}
.bpip {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  animation: bpipPulse 2s ease-in-out infinite;
}
.bpip:nth-child(1) { animation-delay: 0s; }
.bpip:nth-child(2) { animation-delay: .3s; background: rgba(255,255,255,0.5); }
.bpip:nth-child(3) { animation-delay: .6s; background: rgba(255,255,255,0.8); }
.bpip:nth-child(4) { animation-delay: .9s; background: rgba(255,255,255,0.5); }
.bpip:nth-child(5) { animation-delay:1.2s; }
@keyframes bpipPulse {
  0%,100% { transform: scale(1);   opacity: .7; }
  50%     { transform: scale(1.5); opacity: 1;  }
}

/* ─────────────────────────────────
   LEVER
───────────────────────────────── */
#lever-mount {
  position: absolute;
  right: -60px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

#lever-svg {
  display: block;
  overflow: visible;
  width: 48px;
  height: 220px;
}

/* hint */
#lever-hint {
  position: absolute;
  right: -56px;
  top: calc(50% - 112px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  pointer-events: none;
}
#lever-hint .hl {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: rgba(77,114,251,0.65);
  font-family: 'Helvetica Neue', Arial, sans-serif;
}
#lever-hint .ha {
  font-size: 15px;
  color: #4D72FB;
  animation: hintBob 1s ease-in-out infinite;
}
@keyframes hintBob {
  0%,100% { transform: translateY(0);  opacity: .9; }
  50%     { transform: translateY(6px); opacity: .35; }
}
#lever-hint.gone { opacity: 0; transition: opacity .3s; }

/* ─────────────────────────────────
   PARTICLES
───────────────────────────────── */
.bling {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  animation: bfly var(--dur) ease-out forwards;
  animation-delay: var(--delay);
}
@keyframes bfly {
  from { transform: translate(0,0) scale(1); opacity: 1; }
  to   { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
}
</style>
</head>
<body>

<div id="machine-wrapper">

  <div id="slot-machine">

    <div class="header-pips">
      <div class="pip"></div>
      <div class="pip"></div>
      <div class="pip wide"></div>
      <div class="pip"></div>
      <div class="pip"></div>
    </div>

    <div class="screen-wrap">
      <div id="reel-viewport">
        <div id="reel-strip"></div>
      </div>
    </div>

    <div id="result-msg"></div>

    <div class="bottom-pips">
      <div class="bpip"></div>
      <div class="bpip"></div>
      <div class="bpip"></div>
      <div class="bpip"></div>
      <div class="bpip"></div>
    </div>

  </div>

  <div id="lever-hint">
    <span class="hl">PULL</span>
    <span class="ha">↓</span>
  </div>

  <div id="lever-mount">
    <!--
      Lever: clean 3-part shape.
      Mount  = darker blue pill  (static)
      Shaft  = white rounded rod (rotates)
      Knob   = white circle      (rotates)
      Pivot  = (16, 118)
    -->
    <svg id="lever-svg" viewBox="0 0 48 220">

      <!-- mount bracket — sits on the machine side, static -->
      <rect x="4" y="96" width="22" height="44" rx="11"
            fill="#3558D4"/>

      <!-- lever arm group — rotates around pivot -->
      <g id="leverGroup">
        <!-- shaft -->
        <rect x="13" y="18" width="6" height="103" rx="3"
              fill="white" opacity="0.88"/>
        <!-- knob -->
        <circle cx="16" cy="13" r="14" fill="white"/>
        <!-- knob inner depth ring -->
        <circle cx="16" cy="13" r="14"
                fill="none"
                stroke="rgba(77,114,251,0.12)"
                stroke-width="3"/>
        <!-- knob glint -->
        <circle cx="11" cy="8" r="4" fill="rgba(255,255,255,0.5)"/>
      </g>

    </svg>
  </div>

</div><!-- /machine-wrapper -->

<script>
'use strict';

/* ═══════════════════════════════
   CONFIG
═══════════════════════════════ */
const SYMBOLS = [
  { id:'s2', file:'slice/slice2.png', label:'주황이',   weight:22, jackpot:false },
  { id:'s3', file:'slice/slice3.png', label:'초록이',   weight:20, jackpot:false },
  { id:'s4', file:'slice/slice4.png', label:'노랑이',   weight:18, jackpot:false },
  { id:'s5', file:'slice/slice5.png', label:'파랑이',   weight:16, jackpot:false },
  { id:'s6', file:'slice/slice6.png', label:'분홍이',   weight:14, jackpot:false },
  { id:'s7', file:'slice/slice7.png', label:'모자언니', weight: 8, jackpot:false },
  { id:'s9', file:'slice/slice9.png', label:'JACKPOT',  weight: 2, jackpot:true  },
];

const REPEATS = 10;
const N       = SYMBOLS.length;
let SYM_H = 0, SET_H = 0;   // resolved after layout

/* ═══════════════════════════════
   SFX
═══════════════════════════════ */
const Sfx = (() => {
  let ac = null, spinNodes = null;
  const ctx = () => {
    if (!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    return ac;
  };
  return {
    click() {
      const c = ctx();
      const buf = c.createBuffer(1, c.sampleRate * .07, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++)
        d[i] = (Math.random()*2-1) * Math.exp(-i/d.length*45) * .9;
      const s = c.createBufferSource(); s.buffer = buf;
      s.connect(c.destination); s.start();
    },
    startSpin() {
      this.stopSpin();
      const c = ctx();
      const m = c.createGain();
      m.gain.setValueAtTime(0, c.currentTime);
      m.gain.linearRampToValueAtTime(.22, c.currentTime + .28);
      m.connect(c.destination);

      const osc = c.createOscillator(); osc.type='sawtooth'; osc.frequency.value=72;
      const dc = new Float32Array(256);
      for (let i=0;i<256;i++){const x=i/128-1;dc[i]=(Math.PI+180)*x/(Math.PI+180*Math.abs(x));}
      const dist = c.createWaveShaper(); dist.curve = dc;
      osc.connect(dist).connect(m); osc.start();

      const nb = c.createBuffer(1, c.sampleRate*3, c.sampleRate);
      const nd = nb.getChannelData(0);
      for (let i=0;i<nd.length;i++) nd[i] = Math.random()*2-1;
      const ns = c.createBufferSource(); ns.buffer=nb; ns.loop=true;
      const f = c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1400; f.Q.value=2.5;
      const ng = c.createGain(); ng.gain.value=.038;
      ns.connect(f).connect(ng).connect(m); ns.start();

      spinNodes = {osc, ns, m};
    },
    stopSpin() {
      if (!spinNodes) return;
      const c = ctx();
      spinNodes.m.gain.linearRampToValueAtTime(0, c.currentTime+.35);
      setTimeout(()=>{ try{spinNodes.osc.stop()}catch(e){}
                       try{spinNodes.ns.stop()}catch(e){} }, 420);
      spinNodes = null;
    },
    thud() {
      const c = ctx();
      const buf = c.createBuffer(1, c.sampleRate*.12, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++)
        d[i] = (Math.random()*2-1) * Math.exp(-i/d.length*22) * .6;
      const s = c.createBufferSource(); s.buffer=buf;
      s.connect(c.destination); s.start();
    },
    jackpot() {
      const c = ctx();
      [523.25, 659.25, 783.99, 1046.5, 1318.5, 1568].forEach((freq, i) => {
        const t = c.currentTime + i*.1;
        const o = c.createOscillator(); o.type='sine'; o.frequency.value=freq;
        const g = c.createGain();
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(.34, t+.04);
        g.gain.exponentialRampToValueAtTime(.001, t+.62);
        o.connect(g).connect(c.destination); o.start(t); o.stop(t+.68);
      });
    }
  };
})();

/* ═══════════════════════════════
   ReelController
═══════════════════════════════ */
const ReelController = (() => {
  const strip    = document.getElementById('reel-strip');
  const viewport = document.getElementById('reel-viewport');
  let posY = 0, spinning = false;

  function build() {
    SYM_H = viewport.getBoundingClientRect().width;
    SET_H = N * SYM_H;
    strip.innerHTML = '';
    for (let r = 0; r < REPEATS; r++)
      for (const sym of SYMBOLS) {
        const cell = document.createElement('div');
        cell.className = 'sym-cell';
        cell.style.cssText = `width:${SYM_H}px;height:${SYM_H}px;`;
        const img = document.createElement('img');
        img.src = sym.file; img.alt = sym.label; img.draggable = false;
        cell.appendChild(img); strip.appendChild(cell);
      }
    strip.style.height = (N * REPEATS * SYM_H) + 'px';
    _applyY(0);
  }

  function _applyY(y) { posY=y; strip.style.transform=`translateY(${-y}px)`; }

  function _pick() {
    const tot = SYMBOLS.reduce((s,x)=>s+x.weight, 0);
    let r = Math.random() * tot;
    for (const sym of SYMBOLS) { r -= sym.weight; if (r<=0) return sym; }
    return SYMBOLS.at(-1);
  }

  function _target(idx, minY) {
    let y = idx * SYM_H;
    while (y < minY) y += SET_H;
    return y;
  }

  /* multi-phase easing */
  const E = { in3:t=>t**3, linear:t=>t, out3:t=>1-(1-t)**3, out5:t=>1-(1-t)**5 };
  function _kf(t, s, dist) {
    const ph = [
      [0.00,0.14,0.00,0.08,E.in3   ],
      [0.14,0.72,0.08,0.82,E.linear],
      [0.72,0.86,0.82,0.91,E.out3  ],
      [0.86,1.00,0.91,1.00,E.out5  ],
    ];
    const p  = ph.find(k=>t<=k[1]) || ph.at(-1);
    const lt = Math.max(0, Math.min(1, (t-p[0])/(p[1]-p[0])));
    return s + dist * (p[2] + (p[3]-p[2]) * p[4](lt));
  }

  function spin(onDone) {
    if (spinning) return; spinning = true;
    const result  = _pick();
    const targetY = _target(SYMBOLS.indexOf(result), posY + SET_H*5);
    const startY  = posY, dist = targetY - startY;
    const TOTAL   = 3800;
    let t0 = null;
    viewport.classList.add('spinning');

    (function frame(ts) {
      if (!t0) t0 = ts;
      const t = Math.min(1, (ts-t0)/TOTAL);
      _applyY(_kf(t, startY, dist));
      if (t < 1) { requestAnimationFrame(frame); return; }
      _applyY(targetY);
      const reset = targetY % SET_H;
      requestAnimationFrame(() => {
        strip.style.transition = 'none';
        strip.style.transform  = `translateY(${-reset}px)`;
        posY = reset;
        requestAnimationFrame(() => { strip.style.transition = ''; });
      });
      spinning = false;
      viewport.classList.remove('spinning');
      onDone(result);
    })(performance.now());
  }

  return { build, spin, get isSpinning(){ return spinning; } };
})();

/* ═══════════════════════════════
   LeverController
═══════════════════════════════ */
const LeverController = (() => {
  const grp   = document.getElementById('leverGroup');
  const mount = document.getElementById('lever-mount');
  const PX=16, PY=118, MAX=62;
  let angle=0, dragging=false, dy0=0, a0=0, pulled=false, raf=null, cb=null;

  const ease = { in3:t=>t**3, out2:t=>1-(1-t)**2, bounce(t){
    const n=7.5625,d=2.75;
    if(t<1/d) return n*t*t;
    if(t<2/d){t-=1.5/d;return n*t*t+.75;}
    if(t<2.5/d){t-=2.25/d;return n*t*t+.9375;}
    t-=2.625/d; return n*t*t+.984375;
  }};

  function _set(a) {
    angle = Math.max(0, Math.min(MAX, a));
    grp.setAttribute('transform', `rotate(${angle},${PX},${PY})`);
  }
  function _to(target, ms, efn, done) {
    cancelAnimationFrame(raf);
    const from=angle, t0=performance.now();
    (function step(ts){
      const t = Math.min(1,(ts-t0)/ms);
      _set(from+(target-from)*efn(t));
      if (t<1) raf=requestAnimationFrame(step); else if(done) done();
    })(performance.now());
  }

  function pull() {
    if (pulled) return; pulled=true;
    Sfx.click();
    _to(MAX, 165, ease.in3, ()=>{
      if(cb) cb();
      setTimeout(()=>_to(0, 500, ease.bounce, ()=>{ pulled=false; }), 100);
    });
  }

  function init(onPull) {
    cb=onPull; _set(0);
    mount.addEventListener('mousedown',  e=>{ dragging=true; dy0=e.clientY; a0=angle; e.preventDefault(); });
    mount.addEventListener('touchstart', e=>{ dragging=true; dy0=e.touches[0].clientY; a0=angle; e.preventDefault(); },{passive:false});
    document.addEventListener('mousemove', e=>{
      if(!dragging) return;
      _set(a0+(e.clientY-dy0)*.55);
      if(angle>=MAX-1.5&&!pulled){ dragging=false; pull(); }
    });
    document.addEventListener('touchmove', e=>{
      if(!dragging) return;
      _set(a0+(e.touches[0].clientY-dy0)*.55);
      if(angle>=MAX-1.5&&!pulled){ dragging=false; pull(); }
    },{passive:false});
    document.addEventListener('mouseup',  ()=>{ if(dragging&&!pulled) _to(0,260,ease.out2,null); dragging=false; });
    document.addEventListener('touchend', ()=>{ if(dragging&&!pulled) _to(0,260,ease.out2,null); dragging=false; });
    mount.addEventListener('click', ()=>{ if(!pulled&&!dragging) pull(); });
  }

  return { init };
})();

/* ═══════════════════════════════
   GameManager
═══════════════════════════════ */
const GameManager = (() => {
  const wrapper  = document.getElementById('machine-wrapper');
  const resultEl = document.getElementById('result-msg');
  const viewport = document.getElementById('reel-viewport');
  const hint     = document.getElementById('lever-hint');
  let hintGone = false;

  function _shake() {
    wrapper.classList.remove('shake'); void wrapper.offsetWidth;
    wrapper.classList.add('shake');
    wrapper.addEventListener('animationend',()=>wrapper.classList.remove('shake'),{once:true});
  }

  function _particles(jackpot) {
    const r  = viewport.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    const colors = jackpot
      ? ['#ffffff','#D4E0FF','#B0C4FF','#4D72FB','#e8eeff']
      : ['#ffffff','#D4E0FF','#B0C4FF'];
    const count = jackpot ? 55 : 20;
    for (let i=0; i<count; i++) {
      const el  = document.createElement('div');
      el.className = 'bling';
      const sz  = (jackpot?7:4) + Math.random()*7;
      const ang = Math.random() * Math.PI*2;
      const spd = (jackpot?130:60) + Math.random()*160;
      const dur = .6 + Math.random()*.8;
      el.style.cssText = `
        left:${cx}px;top:${cy}px;
        width:${sz}px;height:${sz}px;
        background:${colors[i%colors.length]};
        --tx:${(Math.cos(ang)*spd).toFixed(1)}px;
        --ty:${(Math.sin(ang)*spd).toFixed(1)}px;
        --dur:${dur.toFixed(2)}s;
        --delay:${(Math.random()*.18).toFixed(2)}s;
      `;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(), (dur+.4)*1000);
    }
  }

  function startSpin() {
    if (ReelController.isSpinning) return;
    if (!hintGone) { hintGone=true; hint.classList.add('gone'); }
    resultEl.textContent=''; resultEl.style.animation='';
    _shake();
    Sfx.startSpin();

    ReelController.spin(result => {
      Sfx.stopSpin(); Sfx.thud();
      _particles(result.jackpot);
      if (result.jackpot) {
        setTimeout(()=>Sfx.jackpot(), 150);
        viewport.classList.add('jackpot-glow');
        setTimeout(()=>viewport.classList.remove('jackpot-glow'), 5000);
        resultEl.textContent = 'JACKPOT';
        resultEl.style.animation = 'blink .3s ease-in-out infinite';
      } else {
        resultEl.textContent = result.label;
      }
    });
  }

  function init() {
    ReelController.build();
    LeverController.init(startSpin);
  }
  return { init };
})();

GameManager.init();
</script>
</body>
</html>
