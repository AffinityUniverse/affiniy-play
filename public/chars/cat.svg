<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- ears -->
  <polygon points="22,42 30,22 40,42" fill="#F4A636"/>
  <polygon points="60,42 70,22 78,42" fill="#F4A636"/>
  <polygon points="25,42 30,28 37,42" fill="#FFB0B0"/>
  <polygon points="63,42 70,28 75,42" fill="#FFB0B0"/>
  <!-- body -->
  <ellipse cx="50" cy="60" rx="30" ry="28" fill="#F4A636"/>
  <!-- stripes on head -->
  <path d="M33 48 Q50 44 67 48" stroke="#D4831A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M36 54 Q50 50 64 54" stroke="#D4831A" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- eyes -->
  <ellipse cx="40" cy="58" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="60" cy="58" rx="5" ry="5.5" fill="white"/>
  <circle cx="41" cy="59" r="3.5" fill="#222"/>
  <circle cx="61" cy="59" r="3.5" fill="#222"/>
  <circle cx="42" cy="57.5" r="1.2" fill="white"/>
  <circle cx="62" cy="57.5" r="1.2" fill="white"/>
  <!-- nose + mouth -->
  <ellipse cx="50" cy="67" rx="3.5" ry="2.5" fill="#FF8080"/>
  <path d="M48 69 Q50 72 52 69" stroke="#555" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- whiskers -->
  <line x1="20" y1="65" x2="44" y2="67" stroke="#888" stroke-width="1.2"/>
  <line x1="20" y1="69" x2="44" y2="69" stroke="#888" stroke-width="1.2"/>
  <line x1="56" y1="67" x2="80" y2="65" stroke="#888" stroke-width="1.2"/>
  <line x1="56" y1="69" x2="80" y2="69" stroke="#888" stroke-width="1.2"/>
  <!-- balloon string -->
  <line x1="50" y1="30" x2="50" y2="42" stroke="#888" stroke-width="1.5"/>
  <!-- balloon -->
  <ellipse cx="50" cy="22" rx="11" ry="13" fill="#FF6B8A"/>
  <ellipse cx="46" cy="16" rx="3" ry="4" fill="rgba(255,255,255,0.35)"/>
  <path d="M46 35 Q50 38 54 35" stroke="#FF6B8A" stroke-width="1.5" fill="none"/>
</svg>
