<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- submarine body -->
  <ellipse cx="50" cy="60" rx="36" ry="20" fill="#4D72FB"/>
  <!-- submarine front -->
  <ellipse cx="84" cy="60" rx="10" ry="18" fill="#3558D4"/>
  <!-- submarine back -->
  <ellipse cx="16" cy="60" rx="10" ry="15" fill="#3558D4"/>
  <!-- porthole -->
  <circle cx="60" cy="60" r="10" fill="#A0BFFF"/>
  <circle cx="60" cy="60" r="8" fill="#D5E8FF"/>
  <circle cx="60" cy="60" r="8" fill="none" stroke="#3558D4" stroke-width="2"/>
  <!-- window shine -->
  <circle cx="57" cy="56" r="3" fill="rgba(255,255,255,0.6)"/>
  <!-- periscope -->
  <rect x="46" y="30" width="6" height="22" rx="3" fill="#3558D4"/>
  <ellipse cx="49" cy="28" rx="8" ry="5" fill="#3558D4"/>
  <circle cx="49" cy="26" r="4" fill="#A0BFFF"/>
  <!-- propeller -->
  <ellipse cx="16" cy="50" rx="5" ry="10" fill="#FFD700" transform="rotate(30,16,50)"/>
  <ellipse cx="16" cy="70" rx="5" ry="10" fill="#FFD700" transform="rotate(-30,16,70)"/>
  <!-- keyboard shortcut badge -->
  <rect x="25" y="52" width="26" height="16" rx="4" fill="rgba(255,255,255,0.9)"/>
  <text x="38" y="63" text-anchor="middle" font-size="7" font-weight="bold" fill="#333">Ctrl+S</text>
  <!-- bubbles -->
  <circle cx="88" cy="40" r="4" fill="rgba(255,255,255,0.5)" stroke="#A0BFFF" stroke-width="1"/>
  <circle cx="82" cy="30" r="3" fill="rgba(255,255,255,0.4)" stroke="#A0BFFF" stroke-width="1"/>
  <circle cx="92" cy="26" r="2.5" fill="rgba(255,255,255,0.4)" stroke="#A0BFFF" stroke-width="1"/>
  <!-- wave lines -->
  <path d="M10 80 Q20 76 30 80 Q40 84 50 80" stroke="#A0BFFF" stroke-width="2" fill="none"/>
  <path d="M50 84 Q60 80 70 84 Q80 88 90 84" stroke="#A0BFFF" stroke-width="2" fill="none"/>
</svg>
