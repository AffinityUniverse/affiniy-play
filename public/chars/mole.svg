<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- hole -->
  <ellipse cx="50" cy="85" rx="30" ry="12" fill="#6B4C2A"/>
  <ellipse cx="50" cy="83" rx="26" ry="8" fill="#3D2810"/>
  <!-- body (coming out of hole) -->
  <ellipse cx="50" cy="68" rx="22" ry="18" fill="#8B6B4A"/>
  <!-- belly -->
  <ellipse cx="50" cy="72" rx="13" ry="12" fill="#D4A882"/>
  <!-- arms -->
  <ellipse cx="26" cy="72" rx="9" ry="6" fill="#8B6B4A" transform="rotate(-30,26,72)"/>
  <ellipse cx="74" cy="72" rx="9" ry="6" fill="#8B6B4A" transform="rotate(30,74,72)"/>
  <!-- claws left -->
  <circle cx="19" cy="68" r="3" fill="#6B4C2A"/>
  <circle cx="22" cy="64" r="3" fill="#6B4C2A"/>
  <circle cx="17" cy="73" r="3" fill="#6B4C2A"/>
  <!-- claws right -->
  <circle cx="81" cy="68" r="3" fill="#6B4C2A"/>
  <circle cx="78" cy="64" r="3" fill="#6B4C2A"/>
  <circle cx="83" cy="73" r="3" fill="#6B4C2A"/>
  <!-- head -->
  <ellipse cx="50" cy="46" rx="22" ry="20" fill="#8B6B4A"/>
  <!-- snout -->
  <ellipse cx="50" cy="56" rx="10" ry="7" fill="#D4A882"/>
  <!-- nose -->
  <ellipse cx="50" cy="53" rx="5" ry="4" fill="#FF8080"/>
  <!-- eyes -->
  <circle cx="39" cy="43" r="5.5" fill="white"/>
  <circle cx="61" cy="43" r="5.5" fill="white"/>
  <circle cx="39.5" cy="44" r="3.5" fill="#1A1A1A"/>
  <circle cx="61.5" cy="44" r="3.5" fill="#1A1A1A"/>
  <circle cx="38" cy="42.5" r="1.2" fill="white"/>
  <circle cx="60" cy="42.5" r="1.2" fill="white"/>
  <!-- mouth/smile -->
  <path d="M44 59 Q50 63 56 59" stroke="#555" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <!-- hammer -->
  <rect x="64" y="20" width="6" height="24" rx="2" fill="#8B5E3C" transform="rotate(30,67,32)"/>
  <rect x="58" y="14" width="18" height="12" rx="4" fill="#888" transform="rotate(30,67,20)"/>
</svg>
